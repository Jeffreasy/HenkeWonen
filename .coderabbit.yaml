# yaml-language-server: $schema=https://storage.googleapis.com/coderabbit_public_assets/schema.v2.json
#
# CodeRabbit — Henke Wonen portal (LaventeCare)
# -----------------------------------------------------------------------------
# Enterprise-configuratie. Afgestemd op de architectuur van dit portaal:
#   - Multi-tenant Convex-backend: ELKE query/mutatie scoped op tenantId via
#     authz.ts (HMAC-SHA256 actor-tokens; rollen viewer<user<editor<admin).
#   - Winkel ("general") vs Buitendienst ("field") workspaceMode-grenzen.
#   - Financieel correctheids-kritisch domein (offertes/facturen/BTW/calculators).
#   - Destructieve, productie-gerichte catalogus-import & ops-tooling.
#
# Bedien-handleiding + rollout-plan: docs/technisch/coderabbit.md
# Alle keys hieronder zijn geverifieerd tegen schema.v2.json.
# -----------------------------------------------------------------------------

# Reviews, samenvattingen, walkthrough en chat in het Nederlands (repo-breed).
language: "nl-NL"

tone_instructions: "Schrijf beknopt, professioneel Nederlands. Wees concreet; geen Engelse jargon-mix tenzij het een code-symbool of vakterm is. Prioriteer security- en financiële-correctheidsbevindingen boven stijl."

early_access: false
enable_free_tier: true

reviews:
  # 'assertive' = grondiger, meer (ook lager-zekere) opmerkingen. Past bij een
  # security-/financieel-kritische codebase. Zet terug naar 'chill' bij te veel ruis.
  profile: "assertive"

  # Kern van de merge-gate: PR blijft op "changes requested" tot CodeRabbit's
  # opmerkingen zijn opgelost én geen pre_merge_checks in mode 'error' falen.
  # Wordt pas écht blokkerend i.c.m. GitHub branch protection — zie de docs.
  request_changes_workflow: true

  high_level_summary: true
  changed_files_summary: true
  sequence_diagrams: true
  estimate_code_review_effort: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  review_status: true
  collapse_walkthrough: true
  abort_on_close: true

  # Zakelijke toon: geen poëzie / fortune.
  poem: false
  in_progress_fortune: false

  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    base_branches:
      - "main"
      - "master"
    ignore_title_keywords:
      - "WIP"
      - "DO NOT REVIEW"
      - "[skip review]"
    ignore_usernames:
      - "dependabot[bot]"

  # ---------------------------------------------------------------------------
  # SCOPE — welke bestanden CodeRabbit NIET inhoudelijk reviewt.
  # Alleen negatieve ('!') patronen: al het overige blijft in scope.
  # (Secret-scanning draait los hiervan op de hele changeset.)
  # ---------------------------------------------------------------------------
  path_filters:
    - "!**/_generated/**"
    - "!convex/_generated/**"
    - "!dist/**"
    - "!.astro/**"
    - "!.vercel/**"
    - "!node_modules/**"
    - "!**/*.lock"
    - "!package-lock.json"
    - "!docs/generated/**"
    - "!docs/artifacts/**"
    - "!DATA/**"
    - "!**/*.xlsx"
    - "!**/*.xls"
    - "!**/*.csv"
    - "!**/*.pem"
    - "!**/*.key"
    - "!**/secrets/**"
    - "!**/*.min.js"
    - "!**/*.min.css"
    - "!.audit-cache/**"
    - "!.codex-logs/**"
    - "!scratch/**"
    - "!tmp/**"
    - "!temp/**"
    # Grote, gegenereerde seed-datasets — ruis i.p.v. review-waarde.
    - "!convex/catalog/calculatorRulesSeed.ts"
    - "!convex/catalog/priceMatricesSeed.ts"

  # ---------------------------------------------------------------------------
  # GEDRAG — pad-specifieke review-instructies (stapelen van generiek -> specifiek;
  # alle matchende entries worden meegestuurd). Spiegelt .github/CODEOWNERS.
  # ---------------------------------------------------------------------------
  path_instructions:
    - path: "convex/**/*.ts"
      instructions: |
        Multi-tenant backend — behandel als vertrouwensgrens.
        1. AUTHZ-EERST: elke geëxporteerde `query`/`mutation`/`action` MOET als
           ALLEREERSTE handler-statement een guard aanroepen — requireQueryRole /
           requireQueryRoleForTenantId (reads), requireMutationRole /
           requireMutationRoleForTenantId (writes), of requireSyncToken
           (ensureTenant/ensureUser). DB-toegang vóór of zonder guard = kritiek
           beveiligingslek. `internal*` zonder actor-guard mag alleen als het NIET
           via portal.ts wordt geherexporteerd.
        2. TENANT-ISOLATIE: elke .query/.collect/.get/insert/patch/delete is
           tenant-gescoped via een withIndex waarvan de eerste kolom `tenantId` is,
           op de geverifieerde tenant._id uit de guard — nooit een rauwe client-
           tenantId. Bij cross-tabel joins (project→quote→invoice→customer) elke
           vervolgophaling opnieuw op dezelfde tenant controleren. Markeer een
           ongefilterde .collect()/.filter() of een ctx.db.get(id) zonder
           `doc.tenantId === tenant._id`-check.
        3. Geen niet-afgehandelde Promises (no-floating-promises is error).
        4. Gebruikersgerichte fouten via ConvexError met Nederlandstalige tekst
           (anders maskeert prod als generieke "Server Error").
        5. Geen ongebonden .collect() op grote tabellen (products ~20-25k,
           productPrices ~74k): gebruik index-scoping/paginatie/take — Convex
           heeft een harde leeslimiet (~16.384 docs / 8 MiB).
        `ctx: any` is hier bewust en hoeft niet gemeld te worden.
    - path: "convex/authz.ts"
      instructions: |
        Beveiligingshart — beoordeel élke wijziging extra streng. Bewaak dat
        tokenvalidatie ALLE velden checkt: timing-safe signature (timingSafeEqual,
        nooit `===`), `kind`, `tenant`, `exp`, en `sub` indien meegegeven.
        Dev-tokens mogen UITSLUITEND geaccepteerd worden als AUTHZ_TOKEN_SECRET
        ontbreekt ÉN allowsDevAuthzTokens() waar is. Wijs af: verzwakte/weggehaalde
        checks, verruimde rol-allowlists, het toelaten van inactieve tenants/users,
        een sync-token dat als actor wordt geaccepteerd, of verzwakking van
        requireConvexToolingEnabled.
    - path: "convex/schema.ts"
      instructions: |
        Datamodel (30+ tabellen). Nieuwe tabellen hebben `tenantId` als eerste veld
        plus een by_tenant-index. Controleer dat indexen bestaan voor de gebruikte
        query-patronen (geen full-scans) en dat er geen dode/ongebruikte indexen
        bijkomen. Vermijd v.any() waar een concrete validator kan; timestamps zijn
        Unix-milliseconden (v.number()). Markeer breaking schema-wijzigingen die een
        migratie vereisen.
    - path: "convex/{facturen,offertes}/**/*.ts"
      instructions: |
        Financieel domein — correctheids-kritisch.
        - Regeltotalen UITSLUITEND via calculateLineTotals; koptotalen server-side
          herberekend via recalculateQuote uit de regelsnapshots. Vertrouw nooit
          blind client-aangeleverde totalen.
        - createInvoice: bedragen eindig en >= 0, |totaalInclBtw - (subtotaalExBtw +
          btwTotaal)| <= 0.01, en bij gekoppelde offerte gebonden aan de offerte-
          totalen. Hooguit één factuur per offerte.
        - Offerte-mutaties dwingen status === 'draft' af; geen €0-prijsdragende
          regels bij status 'sent'/'accepted'.
        - Facturen/bedragen zijn NIET toegankelijk in workspaceMode 'field'
          (Buitendienst): ensureNotFieldMode moet server-side worden afgedwongen.
        - Schrijven/inzien van bedragen: alleen editor/admin. Let op afronding
          (roundMoney, 2 decimalen) en BTW-modus (exclusive/inclusive/unknown).
    - path: "convex/portalUtils.ts"
      instructions: |
        calculateLineTotals en roundMoney zijn het chokepoint voor álle regel- en
        koptotalen. Bewaak: NaN/Infinity-guard, btwTarief in [0,100], text-regel
        short-circuit (0/0/0), negatieve eenheidsprijs alleen bij regelType
        'discount', en dat recalculateQuote tenant-isolatie respecteert en uit
        regelsnapshots sommeert.
    - path: "convex/catalog/**/*.ts"
      instructions: |
        Catalogus-import op grote tabellen. Flag ongebonden .collect()
        (gebruik chunking/paginatie/take — harde Convex-leeslimiet).
        Destructieve chunk-mutaties (reset/delete by category/supplier, maintenance)
        MOETEN een confirm v.literal(...) + admin-rol + strikte tenant-scope hebben.
        Import met onbekende BTW-modus ('unknown') gaat alleen door met expliciete
        override (allowUnknownVatMode). Tooling-/cleanup-/repair-mutaties zitten
        achter requireConvexToolingEnabled en mogen NIET via portal.ts geëxporteerd
        worden. Klantgerichte richtprijzen komen alleen uit advice_retail/retail —
        nooit inkoop-/staffel-/pseudo-prijzen; 'unknown' BTW levert nooit een prijs.
    - path: "convex/beheer/clearTenantData.ts"
      instructions: |
        Zeer destructieve tenant-wipe. Eis: blijft internalMutation (niet publiek
        client-aanroepbaar), requireConvexToolingEnabled (ALLOW_CONVEX_TOOLING) +
        de exacte confirmPhrase, verwijdert alleen op slug-resolved tenantId in
        correcte dependency-volgorde (kind vóór ouder), batched. Elke verzwakking
        van de tooling-gate of confirmPhrase, of een extra tabel die ongemerkt
        wordt meegenomen, is blokkerend.
    - path: "convex/seed/demo.ts"
      instructions: |
        seed/demo.ts mag NOOIT in productie draaien. Controleer dat het een
        internalMutation blijft achter requireConvexToolingEnabled en niet via
        portal.ts wordt geherexporteerd. Productie seedt uitsluitend via seed/core.ts.
    - path: "src/lib/money.ts"
      instructions: |
        Centrale geldlogica — wijzigingen raken alle bedragen. Controleer
        afrondingsgedrag (roundMoney met Number.EPSILON, 2 decimalen), correcte
        BTW-berekening en valuta-formattering (Intl nl-NL EUR). Vraag om
        bijbehorende testdekking en let op floating-point-valkuilen. NB: dit is een
        afzonderlijke implementatie naast convex/portalUtils.ts — markeer gebruik
        in offerte-/factuurpaden dat de Convex-variant hoort te gebruiken.
    - path: "src/lib/calculators/**/*.ts"
      instructions: |
        Pure inmeet-calculators (indicatieve hoeveelheden/richtprijs). Eis: pure
        functies zonder side-effects en zonder Convex-imports, NaN/negatieve-input-
        guards, conservatieve omhoog-afronding (er mag nooit te weinig geoffreerd/
        besteld worden), en out-of-range → null ("offerte op maat"). Calculators
        stellen NOOIT de definitieve prijs vast — dat hoort in de offertebuilder.
        Vraag om unit-tests bij gewijzigde rekenregels.
    - path: "src/lib/quotes/**/*.ts"
      instructions: |
        Klantgericht offertedocument. Controleer dat totalen 1-op-1 uit de offerte
        komen (geen herberekening met afwijkende afronding), dat een
        requiresManualReview-vlag wordt gezet bij €0-prijs/review-metadata, en dat
        BTW-label/valuta (nl-NL, EUR) consistent zijn. measurementCatalogMapping-
        categorienamen moeten exact matchen met de categories-tabel.
    - path: "src/lib/auth/**/*.ts"
      instructions: |
        Auth-laag. Actor/sync-tokens blijven kortlevend (TOKEN_TTL) en worden met
        het juiste `kind` + tenant/sub gemint; JWT-verificatie forceert HS256 en
        controleert exp/nbf. Dev-tokens/dev-auth zijn UITSLUITEND beschikbaar als
        een secret ontbreekt + expliciete ALLOW_DEV_*-flag. AUTHZ_TOKEN_SECRET /
        LAVENTECARE_JWT_SECRET en cookies mogen nooit gelogd of naar de client
        teruggegeven worden. De LaventeCare-tenant wordt server-side geforceerd
        (forceTenantId) — een client mag de tenant niet kunnen overschrijven.
    - path: "src/middleware.ts"
      instructions: |
        SSR auth-gateway. /portal-routes zonder geldige sessie redirecten naar
        /login; de actor-token wordt per request server-side gemint en belandt
        nooit in logs; de workspaceMode 'field'-routing (Buitendienst) blijft
        intact. Wijs verzwakking van de poort-bewaking (protectsPortal) af.
    - path: "src/pages/api/**/*.ts"
      instructions: |
        Server-endpoints — vertrouwensgrens. Controleer authenticatie/autorisatie
        per route en tenant-scoping. De auth-proxy laat alleen paden uit
        ALLOWED_AUTH_PATHS door en past stripSensitiveAuthFields op élke response
        toe (access_token/refresh_token/id_token mogen nooit lekken). Geen
        ongeauthenticeerde data-endpoints; geen secrets in logs/foutmeldingen.
    - path: "src/components/**/*.tsx"
      instructions: |
        React 19 islands. Eis dat schrijf-/beheeracties achter de juiste rol-helper
        uit src/lib/auth/session.ts staan (canWrite/canManage/canEditDossiers/
        canEditQuotes/canEditCatalog/canViewFinancials) — vergelijk geen role-strings
        handmatig. UI-gating is UX-only; de server (authz.ts) doet de echte controle.
        Volg react-hooks/rules-of-hooks (geen hooks na early return) en let op
        volledige useEffect-dependencies. Gebruik bestaande primitives uit
        src/components/ui/**. Toegankelijkheid: decoratieve lucide-react iconen
        aria-hidden, icon-only knoppen een toegankelijke naam, formuliervelden via
        de Field-primitive.
    - path: "src/**/*.{ts,tsx}"
      instructions: |
        Frontend-conventies. Data-toegang loopt via createConvexHttpClient(session)
        (GEEN Convex react-hooks): elke call geeft tenantSlug: session.tenantId mee,
        mutaties bovendien actor: mutationActorFromSession(session). Standaardpatroon:
        null-check op de client met NL-melding, try/catch met console.error +
        setError/showToast, finally setIsLoading(false). Geld/BTW uitsluitend via
        src/lib/money.ts (roundMoney/calculateVat/calculateIncVat/formatEuro) en
        datums via src/lib/dates.ts — geen ad-hoc afronding (toFixed/Math.round) of
        parallelle BTW-/valuta-logica in componenten. Gebruikersgerichte teksten in
        het Nederlands via src/lib/i18n/* (statusLabels.ts / nl.ts).
    - path: "src/**/*.astro"
      instructions: |
        Astro portal-pagina's blijven dun: sessie uit Astro.locals.session,
        redirect naar /login bij afwezigheid, en delegeer naar een React-island
        met client:load en session={session}. Geen Convex-queries of business-logica
        in de frontmatter en geen zware interactiviteit in inline <script>. Let op:
        het volledige session-object (incl. authzToken) wordt naar de client
        geserialiseerd — voeg geen extra gevoelige velden toe en lek geen niet-
        PUBLIC env-vars client-side.
    - path: "tools/**/*.mjs"
      instructions: |
        Ops-/datascripts die rechtstreeks Convex (incl. PRODUCTIE:
        prod:accomplished-kangaroo-354) kunnen muteren. Eis vóór elke
        client.mutation(...): requireCatalogToolTarget(...) met een uniek
        --confirm-production-* flag, requireAuthzSecret bij prod, en een dry-run-
        default (schrijven alleen achter --apply of expliciete confirm). Argument-
        sleutels MOETEN exact matchen met de v.* arg-validators van de aangeroepen
        mutatie. Geen secrets loggen/committen. Markeer een nieuw/gewijzigd muterend
        script zonder deze guard, of dat de guard verzwakt/omzeilt, als blokkerend.
    - path: "tools/**/*.py"
      instructions: |
        Python catalogus-/Excel-tooling. Let op idempotentie, output naar
        docs/generated/ (niet handmatig bewerkte paden), correcte BTW-/categorie-
        mapping, read-only behandeling van bronbestanden, en geen hardcoded
        credentials.
    - path: "tests/**/*.ts"
      instructions: |
        Tests. Beschrijvende namen, dekking van edge-cases en foutpaden.
        tests/workflowGuardrails.test.ts is een statische security-/workflow-linter
        die invarianten vergrendelt (delete-whitelist, actor-auth op queries/
        mutaties, draft-only quote-edits, confirm-literals op destructieve mutaties).
        Een wijziging die deze test versoepelt is een bewust policy-besluit — vraag
        om expliciete onderbouwing en behandel als security-relevant.
    - path: "docs/**/*.md"
      instructions: |
        Nederlandstalige docs. Bij code-wijzigingen die gedrag/structuur raken:
        controleer of de relevante module-README/docs meegewijzigd zijn. Bewerk geen
        gegenereerde bestanden (docs/generated/**). Houd datum-gestempelde audit-/
        runbook-conventies aan.

  # ---------------------------------------------------------------------------
  # LABELS — automatisch toegepast op basis van onderstaande instructies.
  # ---------------------------------------------------------------------------
  auto_apply_labels: true
  labeling_instructions:
    - label: "security"
      instructions: "Wijzigingen aan authz.ts, tokens, auth-laag (src/lib/auth), middleware, API-routes of toegangscontrole."
    - label: "financieel"
      instructions: "Wijzigingen aan facturen, offertes, BTW, prijslogica, money.ts of de calculators."
    - label: "convex-backend"
      instructions: "Wijzigingen onder convex/ (queries, mutaties, schema)."
    - label: "catalogus"
      instructions: "Wijzigingen aan de catalogus-import-pipeline (convex/catalog of de import-tooling)."
    - label: "frontend"
      instructions: "Wijzigingen aan src/components, src/pages of de Astro/React-frontend."
    - label: "prod-impact"
      instructions: "Destructieve of productie-gerichte changes: tools/ met --apply/--production, clearTenantData, seed, schema-migraties of veld-renames."
    - label: "docs"
      instructions: "Wijzigingen die uitsluitend documentatie (docs/, README's) raken."

  # ---------------------------------------------------------------------------
  # PRE-MERGE CHECKS — blokkerend (mode 'error') alleen i.c.m.
  # request_changes_workflow: true ÉN GitHub branch protection. Zie de docs voor
  # het rollout-plan (start in 'warning', escaleer naar 'error').
  # ---------------------------------------------------------------------------
  pre_merge_checks:
    # Beperk override ("Ignore failed checks") tot aangewezen reviewers.
    override_requested_reviewers_only: true
    title:
      mode: "error"
      requirements: "Conventional Commits-stijl: type(scope): onderwerp (bijv. fix(facturen): ...). Beschrijvend en in het Nederlands."
    description:
      mode: "warning"
    issue_assessment:
      mode: "warning"
    # Docstring-coverage past niet bij de Nederlandse inline-comment-conventie.
    docstrings:
      mode: "off"
    custom_checks:
      - name: "Tenant-isolatie & authz"
        mode: "error"
        instructions: |
          Faal als een nieuwe of gewijzigde Convex query/mutation/action db-toegang
          doet zonder (a) een authz-guard (requireQueryRole/requireMutationRole/
          requireSyncToken/requireConvexToolingEnabled) als eerste statement, óf
          (b) tenant-scoping via een withIndex op tenantId met de geverifieerde
          tenant._id. Benoem de betreffende functie en het ontbrekende slot.
      - name: "Geen secrets of klant-PII in de diff"
        mode: "error"
        instructions: |
          Faal als de diff credentials, API-keys, tokens, AUTHZ_TOKEN_SECRET/
          LAVENTECARE_JWT_SECRET-waarden, of klant-PII (NAW, e-mail, telefoon) als
          letterlijke waarde bevat — buiten .env.example en duidelijke test-fixtures.
          Let ook op gevoelige velden die nieuw aan AppSession of aan props van
          client:load-islands worden toegevoegd (belanden in de client-HTML).
      - name: "Destructieve & productie-guards intact"
        mode: "error"
        instructions: |
          Faal als de PR een ctx.db.delete buiten de bestaande whitelist toevoegt
          zonder admin-rol + confirm-literal + tenant-scope-check, een
          requireConvexToolingEnabled/confirmPhrase-gate verzwakt, seed/demo een pad
          naar productie geeft, of een tools/-script productie laat muteren zonder
          --production + productionConfirmFlag + requireAuthzSecret.
      - name: "Financiële correctheid"
        mode: "warning"
        instructions: |
          Markeer ad-hoc geldberekeningen: afronding zonder roundMoney/Number.EPSILON,
          handmatige €-formatting i.p.v. formatEuro, BTW-berekening die calculateVat/
          calculateLineTotals omzeilt, of client-aangeleverde offerte-/factuurtotalen
          die niet server-side herberekend worden.

  # ---------------------------------------------------------------------------
  # FINISHING TOUCHES — opt-in verbeteringen op verzoek.
  # ---------------------------------------------------------------------------
  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true
    simplify:
      enabled: false

  # ---------------------------------------------------------------------------
  # STATISCHE ANALYSE / SECURITY-TOOLS.
  # Defaults staan grotendeels AAN; een tool draait alleen bij matchende files.
  # Hieronder expliciet voor deze TS/Astro/Convex/Python-repo + CI-yaml + .env.
  # ---------------------------------------------------------------------------
  tools:
    eslint:
      enabled: true
    oxc:
      enabled: true          # Oxlint — snelle extra JS/TS-lint
    biome:
      enabled: false         # geen biome.json in de repo
    gitleaks:
      enabled: true          # secret-scanning op de hele changeset
    dotenvLint:
      enabled: true          # kwaliteit van .env.example
    semgrep:
      enabled: true
    ruff:
      enabled: true          # Python in tools/
    actionlint:
      enabled: true          # .github/workflows/ci.yml
    zizmor:
      enabled: true          # GitHub Actions security (secrets in workflows)
    yamllint:
      enabled: true
    osvScanner:
      enabled: true          # bekende kwetsbaarheden in npm-dependencies
    markdownlint:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 90000
    languagetool:
      enabled: false         # prose-grammar nags op Nederlandse docs = ruis
    ast-grep:
      essential_rules: true
      # rule_dirs:           # eigen Convex/Astro-regels:
      #   - ".coderabbit/ast-grep-rules"

# -----------------------------------------------------------------------------
chat:
  auto_reply: true

# -----------------------------------------------------------------------------
# KENNISBANK — leert van deze repo en eerdere reviews.
# 'local' houdt learnings strikt binnen HenkeWonen (client-scheiding van andere
# LaventeCare-repo's). Verwijst expliciet naar de bestaande NL-documentatie.
# -----------------------------------------------------------------------------
knowledge_base:
  opt_out: false
  web_search:
    enabled: true
  learnings:
    scope: "local"
  issues:
    scope: "local"
  pull_requests:
    scope: "local"
  code_guidelines:
    enabled: true
    filePatterns:
      - "docs/**/*.md"
      - "**/README.md"
      - "CLAUDE.md"
      - ".github/copilot-instructions.md"

# -----------------------------------------------------------------------------
# CODE-GENERATIE — gegenereerde docstrings in het Nederlands (code-comments in
# deze repo zijn Nederlands).
# -----------------------------------------------------------------------------
code_generation:
  docstrings:
    language: "nl-NL"
